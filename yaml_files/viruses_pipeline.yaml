# PIPELINE DEFINITION
# Name: viruses
# Description: Pipeline for virus-related analysis or classification.
# Inputs:
#    category: str [Default: 'generic']
# Outputs:
#    Output: str
components:
  comp-viruses-step:
    executorLabel: exec-viruses-step
    inputDefinitions:
      parameters:
        category:
          defaultValue: generic
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-viruses-step:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - viruses_step
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef viruses_step(category: str = \"generic\") -> str:\n    \"\"\"\
          Demo component for viruses pipeline.\"\"\"\n    msg = f\"Viruses pipeline:\
          \ category '{category}'.\"\n    print(msg)\n    return msg\n\n"
        image: python:3.10-slim
pipelineInfo:
  description: Pipeline for virus-related analysis or classification.
  name: viruses
root:
  dag:
    outputs:
      parameters:
        Output:
          valueFromParameter:
            outputParameterKey: Output
            producerSubtask: viruses-step
    tasks:
      viruses-step:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-viruses-step
        inputs:
          parameters:
            category:
              componentInputParameter: category
        taskInfo:
          name: viruses-step
  inputDefinitions:
    parameters:
      category:
        defaultValue: generic
        isOptional: true
        parameterType: STRING
  outputDefinitions:
    parameters:
      Output:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
