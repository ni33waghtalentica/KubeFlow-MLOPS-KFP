# PIPELINE DEFINITION
# Name: sentiment-check
# Description: Demo pipeline for text sentiment analysis.
# Inputs:
#    text_input: str [Default: 'Hello world']
# Outputs:
#    Output: str
components:
  comp-sentiment-step:
    executorLabel: exec-sentiment-step
    inputDefinitions:
      parameters:
        text_input:
          defaultValue: Hello world
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-sentiment-step:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - sentiment_step
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef sentiment_step(text_input: str = \"Hello world\") -> str:\n \
          \   \"\"\"Demo component: simulates a sentiment result for the given text.\"\
          \"\"\n    # Placeholder: in a real pipeline you'd call a model or API\n\
          \    result = f\"Sentiment Check: processed '{text_input[:50]}...' (demo).\"\
          \n    print(result)\n    return result\n\n"
        image: python:3.10-slim
pipelineInfo:
  description: Demo pipeline for text sentiment analysis.
  name: sentiment-check
root:
  dag:
    outputs:
      parameters:
        Output:
          valueFromParameter:
            outputParameterKey: Output
            producerSubtask: sentiment-step
    tasks:
      sentiment-step:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-sentiment-step
        inputs:
          parameters:
            text_input:
              componentInputParameter: text_input
        taskInfo:
          name: sentiment-step
  inputDefinitions:
    parameters:
      text_input:
        defaultValue: Hello world
        isOptional: true
        parameterType: STRING
  outputDefinitions:
    parameters:
      Output:
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
